openapi: 3.0.0
info:
  title: Auth Service API
  version: 1.0.0
  description: |
    Layanan Autentikasi dan Manajemen Pengguna untuk PT Solusi Bangunan Berkah.

    ## Fitur Utama
    - Registrasi & Login dengan JWT (access + refresh token)
    - Role-based access control (admin, user)
    - Profile management

    ## Test Credentials
    | Role | Email | Password |
    |------|-------|----------|
    | Admin | admin@solusi-bangunan.com | admin123 |
    | User | user@solusi-bangunan.com | user123 |
  contact:
    name: PT Solusi Bangunan Berkah
    email: admin@solusi-bangunan.com
servers:
  - url: /
    description: Current origin (gateway atau direct)
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token dari POST /api/auth/login
  schemas:
    User:
      type: object
      required: [_id, name, email, role]
      properties:
        _id: { type: string, example: "691ef08ae6f9bf4be4f77d1b" }
        name: { type: string, example: "John Doe" }
        email: { type: string, format: email, example: "john@example.com" }
        role: { type: string, enum: [admin, user], example: "user" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    LoginResponse:
      type: object
      properties:
        success: { type: boolean, example: true }
        message: { type: string, example: "Login berhasil" }
        data:
          type: object
          properties:
            user_id: { type: string, example: "691ef08ae6f9bf4be4f77d1b" }
            accessToken: { type: string, example: "eyJhbGciOiJIUzI1NiIs..." }
            refreshToken: { type: string, example: "eyJhbGciOiJIUzI1NiIs..." }
            expiresIn: { type: string, example: "24h" }
    Error:
      type: object
      properties:
        success: { type: boolean, example: false }
        message: { type: string, example: "Email sudah terdaftar" }
tags:
  - name: Autentikasi
    description: Login, Register, Refresh Token, Logout
  - name: Pengguna
    description: Manajemen data pengguna
paths:
  /api/auth/register:
    post:
      summary: Pendaftaran pengguna baru
      description: Mendaftarkan akun baru. Email harus unik. Password di-hash dengan bcryptjs.
      tags: [Autentikasi]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string, example: "John Doe" }
                email: { type: string, format: email, example: "john@example.com" }
                password: { type: string, format: password, example: "SecurePass123!" }
                role: { type: string, enum: [admin, user], default: user }
      responses:
        "201": { description: Pengguna berhasil terdaftar }
        "400": { description: Validasi gagal atau email sudah terdaftar }
        "500": { description: Error server }
  /api/auth/login:
    post:
      summary: Login pengguna
      description: Login dan mendapatkan JWT access token (berlaku 24 jam) + refresh token (7 hari).
      tags: [Autentikasi]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email, example: "admin@solusi-bangunan.com" }
                password: { type: string, format: password, example: "admin123" }
      responses:
        "200":
          description: Login berhasil
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LoginResponse" }
        "401": { description: Kredensial tidak valid }
        "400": { description: Validasi gagal }
        "500": { description: Error server }
  /api/auth/refresh:
    post:
      summary: Refresh access token
      description: Mendapatkan access token baru menggunakan refresh token tanpa login ulang.
      tags: [Autentikasi]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string, example: "eyJhbGciOiJIUzI1NiIs..." }
      responses:
        "200": { description: Token berhasil di-refresh }
        "401": { description: Refresh token tidak valid }
        "500": { description: Error server }
  /api/auth/profile:
    get:
      summary: Ambil profil pengguna saat ini
      description: Mengambil profil berdasarkan JWT token di header Authorization.
      tags: [Autentikasi]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Profil berhasil diambil }
        "401": { description: Token tidak valid }
        "500": { description: Error server }
  /api/auth/logout:
    post:
      summary: Logout pengguna
      description: Logout dan invalidate session. Harus login ulang setelahnya.
      tags: [Autentikasi]
      security: [{ bearerAuth: [] }]
      responses:
        "200": { description: Logout berhasil }
        "401": { description: Token tidak valid }
        "500": { description: Error server }
  /api/users:
    get:
      summary: Daftar semua pengguna (Admin)
      description: Melihat daftar semua pengguna terdaftar. Mendukung pagination dan filter.
      tags: [Pengguna]
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: query, name: page, schema: { type: integer, default: 1 } }
        - { in: query, name: limit, schema: { type: integer, default: 20 } }
        - { in: query, name: role, schema: { type: string, enum: [admin, user] } }
        - { in: query, name: search, schema: { type: string }, description: "Cari nama/email" }
      responses:
        "200": { description: Daftar pengguna berhasil diambil }
        "401": { description: Token tidak valid }
        "403": { description: User bukan admin }
        "500": { description: Error server }
  /api/users/{id}:
    get:
      summary: Detail pengguna
      description: User biasa hanya bisa lihat profil sendiri, admin bisa lihat semua.
      tags: [Pengguna]
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200": { description: Detail berhasil diambil }
        "401": { description: Token tidak valid }
        "403": { description: Tidak memiliki akses }
        "404": { description: Pengguna tidak ditemukan }
        "500": { description: Error server }
    put:
      summary: Update data pengguna
      description: User biasa update profil sendiri, admin bisa update semua.
      tags: [Pengguna]
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string, example: "John Updated" }
                email: { type: string, format: email }
                phone: { type: string }
                address: { type: string }
      responses:
        "200": { description: Data berhasil diperbarui }
        "400": { description: Validasi gagal }
        "401": { description: Token tidak valid }
        "404": { description: Pengguna tidak ditemukan }
        "500": { description: Error server }
    delete:
      summary: Hapus pengguna (Admin)
      description: Menghapus akun pengguna secara permanen. Tidak dapat dibatalkan.
      tags: [Pengguna]
      security: [{ bearerAuth: [] }]
      parameters:
        - { in: path, name: id, required: true, schema: { type: string } }
      responses:
        "200": { description: Pengguna berhasil dihapus }
        "401": { description: Token tidak valid }
        "403": { description: User bukan admin }
        "404": { description: Pengguna tidak ditemukan }
        "500": { description: Error server }
