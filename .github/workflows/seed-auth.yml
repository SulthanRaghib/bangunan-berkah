name: 🌱 Reseed Auth Service Data

on:
  # Hanya bisa trigger manual dari GitHub UI
  workflow_dispatch:
    inputs:
      confirm:
        description: "Ketik 'yes' untuk konfirmasi reset data user"
        required: true
        type: string
      seed_type:
        description: "Tipe seeding yang dijalankan"
        required: true
        default: "seed-only"
        type: choice
        options:
          - "seed-only"       # Jalankan seeder (hapus user lama + buat baru)
          - "custom-command"  # Jalankan custom command
      custom_command:
        description: "Custom command (hanya jika seed_type = custom-command)"
        required: false
        type: string
        default: ""

concurrency:
  group: server-maintenance
  cancel-in-progress: false

env:
  PROJECT_DIR: /root/bangunan-berkah

jobs:
  reseed:
    name: 🌱 Reseed Auth Data
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: ✅ Validate Confirmation
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "yes" ]; then
            echo "❌ Konfirmasi tidak valid. Ketik 'yes' untuk melanjutkan."
            exit 1
          fi
          echo "✅ Konfirmasi diterima, melanjutkan reseed..."

      - name: 🌱 Run Seeder via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 5m
          script: |
            set -e

            echo ""
            echo "════════════════════════════════════════════════"
            echo "  🌱 AUTH SERVICE RESEED"
            echo "  📅 $(date '+%Y-%m-%d %H:%M:%S %Z')"
            echo "════════════════════════════════════════════════"
            echo ""

            cd ${{ env.PROJECT_DIR }}

            # Cek Docker daemon running
            if ! docker info > /dev/null 2>&1; then
              echo "❌ Docker daemon tidak berjalan! Mencoba start..."
              systemctl start docker
              sleep 5
            fi

            # Cek auth-service container running
            if ! docker ps --format '{{.Names}}' | grep -q "^auth-service$"; then
              echo "❌ auth-service container tidak running!"
              echo "🔄 Mencoba start semua containers..."
              docker compose up -d
              sleep 15
            fi

            SEED_TYPE="${{ github.event.inputs.seed_type }}"

            if [ "$SEED_TYPE" = "seed-only" ]; then
              echo "🌱 Menjalankan prisma:seed pada auth-service..."
              echo "   (Ini akan menghapus semua user dan membuat ulang)"
              echo ""
              docker compose exec -T auth-service npm run prisma:seed
            elif [ "$SEED_TYPE" = "custom-command" ]; then
              CUSTOM_CMD="${{ github.event.inputs.custom_command }}"
              if [ -z "$CUSTOM_CMD" ]; then
                echo "❌ Custom command tidak boleh kosong!"
                exit 1
              fi
              echo "⚡ Menjalankan custom command: $CUSTOM_CMD"
              echo ""
              docker compose exec -T auth-service $CUSTOM_CMD
            fi

            echo ""
            echo "════════════════════════════════════════════════"
            echo "  ✅ RESEED COMPLETED"
            echo "  📅 $(date '+%Y-%m-%d %H:%M:%S %Z')"
            echo "════════════════════════════════════════════════"
